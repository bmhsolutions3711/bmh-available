<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMH Morning Briefing</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
    .header{background:#1F4E79;padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
    .header h1{font-size:20px;font-weight:700;color:white}
    .header .date{font-size:13px;color:#93c5fd}
    .play-btn{background:#00cfff;color:#0f172a;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s}
    .play-btn:hover{background:#38d9f5}
    .play-btn.playing{background:#ef4444;color:white}
    .nav{background:#1e293b;padding:10px 32px;display:flex;gap:8px}
    .nav a{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:600;padding:6px 14px;border-radius:6px;transition:all .2s}
    .nav a:hover,.nav a.active{background:#1F4E79;color:white}
    .content{padding:24px 32px;max-width:1400px;margin:0 auto}
    .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin:24px 0 12px}
    /* Weather */
    .weather-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:8px}
    .hub-card{background:#1e293b;border-radius:12px;padding:16px;border:1px solid #334155}
    .hub-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .hub-name{font-size:13px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
    .hub-city{font-size:16px;font-weight:700;color:white;margin-top:2px}
    .current-weather{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .weather-icon{font-size:36px}
    .weather-temp{font-size:32px;font-weight:700;color:white}
    .weather-desc{font-size:13px;color:#94a3b8;text-transform:capitalize;margin-top:2px}
    .weather-details{display:flex;gap:16px;font-size:12px;color:#64748b;margin-bottom:12px}
    .forecast-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
    .forecast-day{flex:0 0 auto;background:#0f172a;border-radius:6px;padding:6px 8px;text-align:center;min-width:44px}
    .forecast-day .fday{font-size:10px;color:#64748b;font-weight:600}
    .forecast-day .ficon{font-size:18px;margin:2px 0}
    .forecast-day .fhi{font-size:12px;font-weight:700;color:white}
    .forecast-day .flo{font-size:11px;color:#64748b}
    .loading{color:#64748b;font-size:13px;padding:20px 0}
    /* Crypto */
    .crypto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:8px}
    .crypto-card{background:#1e293b;border-radius:12px;padding:16px;border:1px solid #334155}
    .crypto-symbol{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px}
    .crypto-price{font-size:24px;font-weight:700;color:white;margin:4px 0}
    .crypto-change{font-size:13px;font-weight:600}
    .crypto-change.up{color:#22c55e}
    .crypto-change.down{color:#ef4444}
    .news-list{display:flex;flex-direction:column;gap:10px}
    .news-card{background:#1e293b;border-radius:10px;padding:14px 18px;border:1px solid #334155;transition:border-color .2s}
    .news-card:hover{border-color:#00cfff}
    .news-card a{color:#e2e8f0;text-decoration:none;font-size:14px;font-weight:600;line-height:1.4;display:block}
    .news-card a:hover{color:#38bdf8}
    .news-card .news-snippet{font-size:12px;color:#64748b;margin-top:4px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .news-card .news-meta{font-size:11px;color:#475569;margin-top:6px;display:flex;gap:8px;align-items:center}
    .news-card .news-source{background:#334155;color:#94a3b8;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .news-item{background:#1e293b;border-radius:8px;padding:12px 16px;border:1px solid #334155;font-size:13px;color:#94a3b8;line-height:1.5}
    .news-item a{color:#38bdf8;text-decoration:none}
    .news-item a:hover{text-decoration:underline}
    .error{color:#ef4444;font-size:12px;padding:8px 0}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid #334155;border-top-color:#00cfff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #radar-map .leaflet-container{background:#0f172a}
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="header">
  <div>
    <h1>☀️ BMH Morning Briefing</h1>
    <div class="date" id="header-date"></div>
  </div>
  <button class="play-btn" id="play-btn" onclick="toggleBriefing()">▶ Play Briefing</button>
</div>
<div class="nav">
  <a href="dashboard.html">Dashboard</a>
  <a href="planning.html">Planning</a>
  <a href="briefing.html" class="active">Morning Briefing</a>
  <a href="operations.html">⚙️ Operations</a>
  <a href="organization.html">✅ Tasks</a>
</div>
<div class="content">

  <div class="section-title">🛰 Live US Radar</div>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <button id="btn-past" onclick="setRadarMode('past')" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid #00cfff;background:#00cfff;color:#0f172a;font-size:12px;font-weight:700;cursor:pointer">⏪ Past (2hr)</button>
    <button id="btn-forecast" onclick="setRadarMode('forecast')" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid #334155;background:transparent;color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer">⏩ Forecast (2hr)</button>
  </div>
  <div id="radar-map" style="width:100%;height:500px;border-radius:12px;overflow:hidden;margin-bottom:8px;border:1px solid #334155"></div>
  <div id="radar-label" style="font-size:11px;color:#64748b;text-align:center;margin-bottom:16px">Showing: Last 2 hours of actual radar</div>

  <div class="section-title">🌤 Regional Weather Hubs</div>
  <div class="weather-grid" id="weather-grid">
    <div class="loading"><span class="spinner"></span>Loading weather...</div>
  </div>

  <div class="section-title">💰 Crypto</div>
  <div class="crypto-grid" id="crypto-grid">
    <div class="loading"><span class="spinner"></span>Loading prices...</div>
  </div>

  <div class="section-title">📰 Crypto News</div>
  <div class="news-list" id="crypto-news">
    <div class="loading"><span class="spinner"></span>Loading crypto news...</div>
  </div>

  <div class="section-title">🤖 AI & Tech News</div>
  <div class="news-list" id="ai-news">
    <div class="loading"><span class="spinner"></span>Loading AI news...</div>
  </div>

</div>

<script>
const OWM_KEY = '2100c08faa7729bbd1d620c0f8b7d104';
const HUBS = [{"name": "Home", "city": "North Canton", "state": "OH", "lat": 40.8759, "lon": -81.4026}, {"name": "Southeast", "city": "Atlanta", "state": "GA", "lat": 33.749, "lon": -84.388}, {"name": "Texas", "city": "Dallas", "state": "TX", "lat": 32.7767, "lon": -96.797}, {"name": "Southwest", "city": "Phoenix", "state": "AZ", "lat": 33.4484, "lon": -112.074}, {"name": "Plains", "city": "St. Louis", "state": "MO", "lat": 38.627, "lon": -90.1994}, {"name": "East Coast", "city": "Newark", "state": "NJ", "lat": 40.7357, "lon": -74.1724}, {"name": "Mountain", "city": "Denver", "state": "CO", "lat": 39.7392, "lon": -104.9903}, {"name": "Northwest", "city": "Boise", "state": "ID", "lat": 43.615, "lon": -116.2023}];

const WX_ICONS = {
  'Clear': '☀️', 'Clouds': '☁️', 'Rain': '🌧️', 'Drizzle': '🌦️',
  'Thunderstorm': '⛈️', 'Snow': '❄️', 'Mist': '🌫️', 'Fog': '🌫️',
  'Haze': '🌫️', 'Smoke': '🌫️', 'Dust': '💨', 'Sand': '💨',
  'Ash': '🌋', 'Squall': '💨', 'Tornado': '🌪️'
};

function wxIcon(main) { return WX_ICONS[main] || '🌡️'; }

function fmtTemp(k) { return Math.round((k - 273.15) * 9/5 + 32) + '°'; }

function dayAbbr(dt) {
  return new Date(dt * 1000).toLocaleDateString('en-US', {weekday:'short'});
}

// ── Weather ──────────────────────────────────────────────────────────────────
let weatherData = {};

async function loadWeather() {
  const grid = document.getElementById('weather-grid');
  grid.innerHTML = '';

  await Promise.all(HUBS.map(async hub => {
    try {
      const [cur, fore] = await Promise.all([
        fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${hub.lat}&lon=${hub.lon}&appid=${OWM_KEY}`).then(r=>r.json()),
        fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${hub.lat}&lon=${hub.lon}&appid=${OWM_KEY}`).then(r=>r.json())
      ]);

      const icon = wxIcon(cur.weather[0].main);
      const temp = fmtTemp(cur.main.temp);
      const feels = fmtTemp(cur.main.feels_like);
      const desc = cur.weather[0].description;
      const wind = Math.round(cur.wind.speed * 2.237) + ' mph';
      const humid = cur.main.humidity + '%';

      // Build 5-day forecast — scan ALL readings per day for true hi/lo
      const dayMap = {};
      const today  = dayAbbr(Math.floor(Date.now()/1000));
      for (const item of fore.list) {
        const d = dayAbbr(item.dt);
        if (d === today) continue;
        if (!dayMap[d]) dayMap[d] = { temps: [], icons: [] };
        dayMap[d].temps.push(item.main.temp);
        dayMap[d].icons.push(item.weather[0].main);
      }
      const days = Object.entries(dayMap).slice(0, 5).map(([d, v]) => {
        const hi  = Math.max(...v.temps);
        const lo  = Math.min(...v.temps);
        const freq = {};
        v.icons.forEach(i => freq[i] = (freq[i]||0) + 1);
        const dominant = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0];
        return { day: d, icon: wxIcon(dominant), hi: fmtTemp(hi), lo: fmtTemp(lo) };
      });

      weatherData[hub.name] = { temp, desc, wind, humid, icon, days };

      const forecastHtml = days.map(d => `
        <div class="forecast-day">
          <div class="fday">${d.day}</div>
          <div class="ficon">${d.icon}</div>
          <div class="fhi">${d.hi}</div>
          <div class="flo">${d.lo}</div>
        </div>`).join('');

      const card = document.createElement('div');
      card.className = 'hub-card';
      card.id = 'hub-' + hub.name.replace(/ /g,'-');
      card.innerHTML = `
        <div class="hub-header">
          <div>
            <div class="hub-name">${hub.name}</div>
            <div class="hub-city">${hub.city}, ${hub.state}</div>
          </div>
        </div>
        <div class="current-weather">
          <div class="weather-icon">${icon}</div>
          <div>
            <div class="weather-temp">${temp}</div>
            <div class="weather-desc">${desc}</div>
          </div>
        </div>
        <div class="weather-details">
          <span>💧 ${humid}</span>
          <span>💨 ${wind}</span>
          <span>Feels ${feels}</span>
        </div>
        <div class="forecast-row">${forecastHtml}</div>`;
      grid.appendChild(card);

    } catch(e) {
      const card = document.createElement('div');
      card.className = 'hub-card';
      card.innerHTML = `<div class="hub-name">${hub.name}</div><div class="error">Failed to load weather</div>`;
      grid.appendChild(card);
    }
  }));
}

// ── Crypto ───────────────────────────────────────────────────────────────────
let cryptoData = {};

async function loadCrypto() {
  const grid = document.getElementById('crypto-grid');
  try {
    const coins = ['ripple','hedera-hashgraph','constellation-labs','ondo-finance','stellar','xdce-crowd-sale','bitcoin'];
    const symbols = {'ripple':'XRP','hedera-hashgraph':'HBAR','constellation-labs':'DAG','ondo-finance':'ONDO','stellar':'XLM','xdce-crowd-sale':'XDC','bitcoin':'BTC'};
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coins.join(',')}&vs_currencies=usd&include_24hr_change=true`);
    const data = await r.json();
    grid.innerHTML = '';
    for (const coin of coins) {
      const price = data[coin]?.usd ?? 0;
      const change = data[coin]?.usd_24h_change ?? 0;
      const sym = symbols[coin];
      const up = change >= 0;
      cryptoData[sym] = {price, change};
      const card = document.createElement('div');
      card.className = 'crypto-card';
      card.innerHTML = `
        <div class="crypto-symbol">${sym}</div>
        <div class="crypto-price">$${price.toFixed(sym==='BTC'?0:4)}</div>
        <div class="crypto-change ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(change).toFixed(2)}% (24h)</div>`;
      grid.appendChild(card);
    }
  } catch(e) {
    grid.innerHTML = '<div class="error">Failed to load crypto prices</div>';
  }
}

// ── News (RSS via rss2json) ──────────────────────────────────────────────────
let cryptoHeadlines = [];
let aiHeadlines = [];

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return tmp.textContent.trim();
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

async function loadRSSNews(containerId, rssUrl, sourceName, fallbackMsg, headlinesArr) {
  const container = document.getElementById(containerId);
  try {
    const r = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
    const data = await r.json();
    if (data.status !== 'ok' || !data.items?.length) throw new Error('no items');
    container.innerHTML = '';
    headlinesArr.length = 0;
    for (const item of data.items.slice(0, 5)) {
      const title = stripHtml(item.title);
      const snippet = stripHtml(item.description).substring(0, 160);
      const source = item.author || sourceName;
      const ago = timeAgo(item.pubDate);
      headlinesArr.push(title);
      const card = document.createElement('div');
      card.className = 'news-card';
      card.innerHTML = `
        <a href="${item.link}" target="_blank">${title}</a>
        <div class="news-snippet">${snippet}</div>
        <div class="news-meta">
          <span class="news-source">${source}</span>
          <span>${ago}</span>
        </div>`;
      container.appendChild(card);
    }
  } catch(e) {
    container.innerHTML = `<div class="news-item">${fallbackMsg}</div>`;
  }
}

function loadCryptoNews() {
  return loadRSSNews(
    'crypto-news',
    'https://cointelegraph.com/rss',
    'CoinTelegraph',
    'Crypto news unavailable — check <a href="https://cointelegraph.com" target="_blank">CoinTelegraph</a> or <a href="https://coindesk.com" target="_blank">CoinDesk</a>.',
    cryptoHeadlines
  );
}

function loadAINews() {
  return loadRSSNews(
    'ai-news',
    'https://news.google.com/rss/search?q=artificial+intelligence+OR+AI+technology&hl=en-US&gl=US&ceid=US:en',
    'Google News',
    'AI news unavailable — check <a href="https://news.google.com/topics/CAAqJQgKIh9DQkFTRVFvSUwyMHZNRGRqTVhZU0JXVnVMVWRDS0FBUAE" target="_blank">Google News AI</a>.',
    aiHeadlines
  );
}

// ── Text-to-Speech ────────────────────────────────────────────────────────────
let speaking = false;

function buildScript() {
  const d = new Date();
  const dayName = d.toLocaleDateString('en-US',{weekday:'long'});
  const dateStr = d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  let script = `Good morning Bryan. Today is ${dayName}, ${dateStr}. Here is your morning briefing. `;

  script += 'Regional weather update. ';
  for (const hub of HUBS) {
    const wx = weatherData[hub.name];
    if (wx) {
      script += `${hub.name}, ${hub.city}. Currently ${wx.temp}, ${wx.desc}, winds at ${wx.wind}. `;
      if (wx.days.length) {
        script += `Forecast: ${wx.days.map(d=>`${d.day} ${d.hi} high ${d.lo} low`).join(', ')}. `;
      }
    }
  }

  script += 'Crypto update. ';
  for (const [sym, d] of Object.entries(cryptoData)) {
    const dir = d.change >= 0 ? 'up' : 'down';
    script += `${sym} is at ${sym==='BTC'?'$'+Math.round(d.price):'$'+d.price.toFixed(4)}, ${dir} ${Math.abs(d.change).toFixed(2)} percent in the last 24 hours. `;
  }

  if (cryptoHeadlines.length) {
    script += 'Top crypto news. ';
    cryptoHeadlines.slice(0, 3).forEach(h => { script += h + '. '; });
  }
  if (aiHeadlines.length) {
    script += 'Top A.I. news. ';
    aiHeadlines.slice(0, 3).forEach(h => { script += h + '. '; });
  }

  script += 'That concludes your morning briefing. Have a great day and stay safe out there.';
  return script;
}

function toggleBriefing() {
  const btn = document.getElementById('play-btn');
  if (speaking) {
    speechSynthesis.cancel();
    speaking = false;
    btn.textContent = '▶ Play Briefing';
    btn.classList.remove('playing');
  } else {
    const script = buildScript();
    const utt = new SpeechSynthesisUtterance(script);
    utt.rate = 0.95;
    utt.pitch = 1.0;
    utt.onend = () => {
      speaking = false;
      btn.textContent = '▶ Play Briefing';
      btn.classList.remove('playing');
    };
    speechSynthesis.speak(utt);
    speaking = true;
    btn.textContent = '⏹ Stop';
    btn.classList.add('playing');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
// ── Animated Radar (RainViewer) ───────────────────────────────────────────────
let radarMap = null;
let radarLayers = [];
let radarTimer = null;
let radarMode = 'past';
let radarData = null;

async function initRadar() {
  radarMap = L.map('radar-map', {
    center: [39.5, -98.35],
    zoom: 4,
    zoomControl: true,
    attributionControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(radarMap);

  try {
    radarData = await fetch('https://api.rainviewer.com/public/weather-maps.json').then(r => r.json());
    setRadarMode('past');
  } catch(e) {
    console.warn('RainViewer load failed', e);
  }
}

function setRadarMode(mode) {
  radarMode = mode;

  // Update button styles
  const btnPast = document.getElementById('btn-past');
  const btnFore = document.getElementById('btn-forecast');
  const label   = document.getElementById('radar-label');

  if (mode === 'past') {
    btnPast.style.background = '#00cfff'; btnPast.style.color = '#0f172a'; btnPast.style.borderColor = '#00cfff';
    btnFore.style.background = 'transparent'; btnFore.style.color = '#94a3b8'; btnFore.style.borderColor = '#334155';
    label.textContent = 'Showing: Last 2 hours of actual radar';
  } else {
    btnFore.style.background = '#00cfff'; btnFore.style.color = '#0f172a'; btnFore.style.borderColor = '#00cfff';
    btnPast.style.background = 'transparent'; btnPast.style.color = '#94a3b8'; btnPast.style.borderColor = '#334155';
    label.textContent = 'Showing: Next 2 hours forecast (RainViewer nowcast)';
  }

  // Clear existing layers and timer
  clearInterval(radarTimer);
  radarLayers.forEach(l => radarMap.removeLayer(l));
  radarLayers = [];

  if (!radarData) return;

  let frames = [];
  if (mode === 'past') {
    frames = radarData.radar.past || [];
  } else {
    // Try nowcast first, fall back to satellite if empty
    frames = (radarData.radar.nowcast && radarData.radar.nowcast.length)
      ? radarData.radar.nowcast
      : (radarData.satellite && radarData.satellite.infrared ? radarData.satellite.infrared.slice(-6) : []);
  }

  if (!frames.length) {
    document.getElementById('radar-label').textContent = 'Forecast not available right now — check back shortly';
    return;
  }

  let currentIdx = 0;

  frames.forEach(frame => {
    const layer = L.tileLayer(
      `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`,
      { opacity: 0, attribution: 'RainViewer' }
    );
    layer.addTo(radarMap);
    radarLayers.push(layer);
  });

  function showFrame(idx) {
    radarLayers.forEach((l, i) => l.setOpacity(i === idx ? 0.7 : 0));
    currentIdx = idx;
  }

  function animate() {
    showFrame(currentIdx);
    currentIdx = (currentIdx + 1) % radarLayers.length;
  }

  showFrame(mode === 'past' ? frames.length - 1 : 0);
  radarTimer = setInterval(animate, 500);
}

document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
loadWeather();
loadCrypto();
loadCryptoNews();
loadAINews();
initRadar();
</script>
</body>
</html>
